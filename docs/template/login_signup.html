<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #13131b;
            color: #e4e1ed;
        }
        .glass-panel {
            background: rgba(27, 27, 35, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(70, 69, 84, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .input-glass {
            background: rgba(13, 13, 21, 0.6);
            border: 1px solid #27272a;
            transition: all 0.2s ease;
        }
        .input-glass:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            background: #6366f1;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }
        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-social {
            background: transparent;
            border: 1px solid #27272a;
            transition: all 0.2s ease;
        }
        .btn-social:hover {
            background: rgba(39, 39, 42, 0.5);
            border-color: #464554;
        }
    </style>

<!-- Animated Background Blobs -->
<div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-blob"></div>
<div class="absolute top-1/3 right-1/4 w-80 h-80 bg-tertiary-container rounded-full mix-blend-screen filter blur-[120px] opacity-20 animate-blob" style="animation-delay: 2s;"></div>
<div class="absolute bottom-1/4 left-1/3 w-96 h-96 bg-secondary-container rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-blob" style="animation-delay: 4s;"></div>
</div>
<!-- Main Content Canvas -->

<div class="glass-panel rounded-xl p-8 md:p-xl flex flex-col gap-xl">
<!-- Brand Logo & Header -->
<div class="flex flex-col items-center gap-md text-center">
<div class="w-12 h-12 rounded-lg bg-gradient-to-br from-primary to-tertiary flex items-center justify-center mb-sm shadow-[0_0_20px_rgba(192,193,255,0.2)]">
<span class="material-symbols-outlined text-surface-container-lowest font-headline-md" style="font-variation-settings: 'FILL' 1;">
                        analytics
                    </span>
</div>
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs tracking-tight">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to JOAT Intelligence to continue.</p>
</div>
</div>
<!-- Form -->
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<input class="input-glass w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<input class="input-glass w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="btn-primary w-full rounded-lg py-3 font-label-sm text-label-sm flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>

<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant opacity-50"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-on-surface-variant">or</span>
