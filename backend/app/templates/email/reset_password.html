<!DOCTYPE html>
<html>
<body style="font-family: Inter, sans-serif; background: #0f172a; color: #f1f5f9; padding: 40px;">
  <div style="max-width: 480px; margin: 0 auto; background: #1e293b; border-radius: 12px; padding: 32px;">
    <h2 style="color: #6366f1; margin-top: 0;">Reset your password</h2>
    <p>Hi {{ full_name }},</p>
    <p>We received a request to reset your password. Click the button below to set a new one.</p>
    <a href="{{ reset_url }}" style="display: inline-block; background: #6366f1; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; margin: 16px 0;">
      Reset Password
    </a>
    <p style="color: #64748b; font-size: 13px;">This link expires in {{ expire_hours }} hours. If you didn't request this, ignore this email.</p>
  </div>
</body>
</html>
